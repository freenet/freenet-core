name: Binstall Smoke Test (Nightly)

# End-to-end check that the LATEST published `freenet` and `fdev` crates can
# actually be installed via `cargo binstall`. The in-repo manifest tests
# (#3997) lock in the structural invariants of the binstall metadata, but they
# cannot catch a user-visible 404: release assets that failed to attach, a
# release stuck in draft, or asset naming that drifted out of sync with the
# `pkg-url` in Cargo.toml. This downloads the real GitHub release assets and
# runs the binaries, so any of those break this workflow. See issue #3998.

on:
  schedule:
    # 5 AM UTC daily — staggered after simulation-nightly (3 AM UTC).
    - cron: "0 5 * * *"
  workflow_dispatch:

# Don't pile up concurrent runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  binstall-smoke-test:
    name: Binstall ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux release assets are built for the musl target (see
          # cross-compile.yml). The default gnu host target would 404, so pin
          # the target binstall resolves to match the published asset name.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          # Windows exercises the `.zip` / `bin-dir = *.exe` override path.
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Install cargo-binstall
        # `@main` is the upstream-recommended ref for this action: the repo's
        # `vX.Y.Z` tags are cargo-binstall *crate* releases, not pinned action
        # versions. Don't "upgrade" this to a vX tag — that pins to a crate
        # release, not the maintained action.
        uses: cargo-bins/cargo-binstall@main

      - name: Resolve latest published versions from crates.io
        id: versions
        shell: bash
        run: |
          set -euo pipefail
          # crates.io requires a descriptive User-Agent or it 403s. `jq` is
          # preinstalled on every GitHub-hosted runner (incl. windows-latest
          # under bash), so it's portable across the matrix.
          UA="freenet-core binstall-smoke-test (https://github.com/freenet/freenet-core)"
          for crate in freenet fdev; do
            json=$(curl -sSf -H "User-Agent: $UA" \
              "https://crates.io/api/v1/crates/${crate}")
            version=$(echo "$json" | jq -er '.crate.max_stable_version')
            echo "Latest ${crate}: ${version}"
            echo "${crate}=${version}" >> "$GITHUB_OUTPUT"
            # Also capture when the freenet version landed on crates.io, so the
            # readiness guard below can tell an in-progress release (crate just
            # published, GitHub release not un-drafted yet) from a genuinely
            # stuck one. Both freenet and fdev binaries ship in the single
            # `v{freenet_version}` GitHub release, so the freenet timestamp is
            # the one that matters.
            if [ "$crate" = "freenet" ]; then
              published_at=$(echo "$json" \
                | jq -er --arg v "$version" \
                    '.versions[] | select(.num == $v) | .created_at')
              echo "freenet_published_at=${published_at}" >> "$GITHUB_OUTPUT"
            fi
          done

      # The release pipeline publishes to crates.io FIRST (release.yml
      # `publish_crates`), then creates the GitHub release as a *draft*, and
      # cross-compile.yml attaches the binaries and only un-drafts it at the
      # very end (`gh release edit --draft=false`) ~30 min later. For that
      # whole cross-compile window crates.io reports the new version as latest
      # while the GitHub release binaries are still a draft binstall can't see,
      # so `cargo binstall` (compile fallback disabled) correctly fails. That is
      # a release *in progress*, not the permanent breakage this smoke test
      # exists to catch (assets that never attached / a release stuck in draft).
      # If the nightly cron happens to run inside that window it hard-fails and
      # pages the dev + River rooms with a false alarm (run 29805611911,
      # 2026-07-21: v0.2.103 draft 05:51Z, published 06:20Z, nightly ran 05:59Z).
      # So gate the binstall assertion on the release actually being published;
      # skip (green, defer to the next nightly) while it is mid-publish, and
      # only fail if it has been unpublished long enough to be genuinely stuck.
      - name: Verify release is published (skip if mid-publish)
        id: release_ready
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ steps.versions.outputs.freenet }}"
          # Minutes an unpublished release may lag crates.io before we treat it
          # as broken rather than in progress. Cross-compile realistically
          # finishes well under this; a real stuck release is still caught here
          # once it ages past the threshold, and always by the next nightly.
          STALE_MIN=90
          now=$(date -u +%s)

          release_json=$(gh release view "$TAG" \
            --repo "${{ github.repository }}" \
            --json isDraft,createdAt 2>/dev/null) || release_json=""

          if [ -z "$release_json" ]; then
            # crates.io has the version but no GitHub release tag exists yet
            # (the brief gap before the draft release is created).
            pub="${{ steps.versions.outputs.freenet_published_at }}"
            pub_epoch=$(date -u -d "$pub" +%s 2>/dev/null || echo 0)
            age_min=$(( (now - pub_epoch) / 60 ))
            if [ "$pub_epoch" -ne 0 ] && [ "$age_min" -gt "$STALE_MIN" ]; then
              echo "::error::freenet ${{ steps.versions.outputs.freenet }} has been on crates.io for ${age_min} min but no GitHub release $TAG exists."
              exit 1
            fi
            echo "::notice::No GitHub release $TAG yet (crates.io publish just landed; release in progress). Skipping binstall assertion — next nightly re-checks."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$(echo "$release_json" | jq -r '.isDraft')" = "true" ]; then
            created=$(echo "$release_json" | jq -r '.createdAt')
            created_epoch=$(date -u -d "$created" +%s 2>/dev/null || echo 0)
            age_min=$(( (now - created_epoch) / 60 ))
            if [ "$created_epoch" -ne 0 ] && [ "$age_min" -gt "$STALE_MIN" ]; then
              echo "::error::Release $TAG has been a draft for ${age_min} min (> ${STALE_MIN}); binaries never published."
              exit 1
            fi
            echo "::notice::Release $TAG is a draft created ${age_min} min ago — release in progress. Skipping binstall assertion — next nightly re-checks."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Release $TAG is published; proceeding with binstall assertions."
          echo "skip=false" >> "$GITHUB_OUTPUT"

      # `--strategies crate-meta-data` restricts binstall to ONLY the GitHub
      # release asset named by the crate's binstall metadata. Without it, the
      # default strategies (crate-meta-data,quick-install,compile) would let a
      # missing/404ing release asset silently fall through to the quickinstall
      # mirror or a from-source compile — and the smoke test would pass while
      # the exact failure mode it exists to detect (a broken release upload)
      # went unnoticed. The whole point is to fail when the GitHub asset is bad.
      # cargo-binstall resolves the release by hitting the GitHub REST API
      # (GET /repos/.../releases/tags/v{version}). Authenticate those calls
      # with GITHUB_TOKEN: unauthenticated they share the per-IP 60 req/hr
      # limit, and GitHub-hosted runner IPs are shared across tenants, so the
      # lookup intermittently 403s and the step hard-fails (the smoke test
      # runs with compile fallback disabled, so a 403 can't fall through).
      # binstall auto-detects GITHUB_TOKEN/GH_TOKEN and switches to the
      # 5000 req/hr authenticated limit. See run 28280841654 (2026-06-27).
      - name: Install freenet via cargo binstall
        if: steps.release_ready.outputs.skip != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo binstall --no-confirm --strategies crate-meta-data \
            --targets "${{ matrix.target }}" \
            "freenet@${{ steps.versions.outputs.freenet }}"

      - name: Install fdev via cargo binstall
        if: steps.release_ready.outputs.skip != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cargo binstall --no-confirm --strategies crate-meta-data \
            --targets "${{ matrix.target }}" \
            "fdev@${{ steps.versions.outputs.fdev }}"

      - name: Assert binaries respond to --version
        if: steps.release_ready.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          freenet --version
          fdev --version

  # Notify the public Freenet River room on failure (same transport as
  # simulation-nightly.yml). Best-effort: never red-fails on its own.
  notify-failure:
    name: Notify River on Failure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: binstall-smoke-test
    if: failure() && needs.binstall-smoke-test.result == 'failure'
    continue-on-error: true
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Install riverctl
        run: cargo install riverctl

      - name: Send failure message to River (with exponential backoff)
        env:
          RIVER_SIGNING_KEY: ${{ secrets.RIVER_SIGNING_KEY }}
        run: |
          MESSAGE="🚨 Nightly Binstall Smoke Test Failed - ${{ github.repository }} - cargo binstall of the latest published freenet/fdev release failed - ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NODE_URL="${{ secrets.RIVER_GATEWAY_URL }}"
          ROOM_ID="${{ secrets.RIVER_ROOM_ID }}"

          max_attempts=7
          delay=10
          for attempt in $(seq 1 $max_attempts); do
            echo "Attempt $attempt/$max_attempts (delay: ${delay}s)..."
            if riverctl --node-url "$NODE_URL" message send "$ROOM_ID" "$MESSAGE" 2>&1; then
              echo "Message sent successfully on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Failed, retrying in ${delay}s..."
              sleep "$delay"
              delay=$((delay * 2))
            fi
          done
          echo "::warning::Failed to send River notification after $max_attempts attempts (gateway may be restarting)"
          exit 0

  # Mirror the failure into the private freenet-dev room.
  notify-dev-room-failure:
    name: Notify dev room on Failure
    runs-on: ubuntu-latest
    needs: binstall-smoke-test
    if: failure() && needs.binstall-smoke-test.result == 'failure'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/river-dev-notify
        with:
          message: "🚨 Nightly binstall smoke test failed — cargo binstall of the latest published freenet/fdev release failed — ${{ github.repository }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          bot-config: ${{ secrets.RIVER_DEV_BOT_CONFIG }}
          room-id: ${{ secrets.RIVER_DEV_ROOM_ID }}
          gateway-url: ${{ secrets.RIVER_GATEWAY_URL }}
