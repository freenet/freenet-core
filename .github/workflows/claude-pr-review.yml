name: Claude PR Rule Review

# Advisory review: checks every PR against .claude/rules/ and posts findings
# as a sticky comment. Non-blocking — does not gate merge.
#
# Triggers:
# - pull_request_target: runs for all PRs (including forks) with base-repo
#   secrets available. Safe because we only read the diff — we never execute
#   fork code (no cargo build/test on the PR head).
# - labeled: re-run when a maintainer adds the 'claude-review' label, useful
#   for fork PRs where the initial run may have been skipped.
#
# Complements (does not replace):
# - ci.yml: cargo fmt, clippy, tests, conventional commits
# - claude.yml: interactive @claude mentions
# - claude-ci-analysis (in ci.yml): failure debugging

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened, labeled]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
  merge_group:

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Auto-pass rule-review/findings for merge queue commits.
  # Findings were already acknowledged on the PR; the merge queue creates new
  # merge commits that would never receive this commit status otherwise.
  merge-queue-pass:
    name: Claude Rule Review
    runs-on: ubuntu-latest
    if: github.event_name == 'merge_group'
    permissions:
      statuses: write
    steps:
      - name: Set rule-review/findings to success
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'rule-review/findings',
              description: 'Auto-passed for merge queue (findings acknowledged on PR)',
            });

  rule-review:
    name: Claude Rule Review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip draft PRs, release branches, dependabot, and merge queue events.
    # For label events, only run when the 'claude-review' label was added.
    if: |
      github.event_name != 'merge_group' &&
      !github.event.pull_request.draft &&
      !startsWith(github.event.pull_request.head.ref, 'release/v') &&
      !startsWith(github.event.pull_request.head.ref, 'dependabot/') &&
      (github.event.action != 'labeled' || github.event.label.name == 'claude-review')

    permissions:
      contents: read
      pull-requests: write
      issues: write
      statuses: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Explicitly checkout the PR head so git diff sees the fork's changes.
          # Safe: we only run git diff and call the Claude API — we never
          # execute the fork's code (no cargo build/test).
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Determine applicable rules
        id: rules
        run: |
          # Get changed files relative to the PR base
          CHANGED_FILES=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD 2>/dev/null || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files detected"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

          # Always include git-workflow rules
          RULES="git-workflow.md"
          HAS_RUST=false
          HAS_CORE=false
          HAS_OPERATIONS=false
          HAS_TRANSPORT=false
          HAS_CONTRACTS=false
          HAS_RING=false

          while IFS= read -r file; do
            # Check for Rust files
            if echo "$file" | grep -qE '\.rs$'; then
              HAS_RUST=true
            fi

            # Check for crates/core/ changes
            if echo "$file" | grep -q '^crates/core/'; then
              HAS_CORE=true
            fi

            # Check for operations module
            if echo "$file" | grep -q '^crates/core/src/operations/'; then
              HAS_OPERATIONS=true
            fi

            # Check for transport module
            if echo "$file" | grep -q '^crates/core/src/transport/'; then
              HAS_TRANSPORT=true
            fi

            # Check for contract/wasm_runtime module
            if echo "$file" | grep -qE '^crates/core/src/(contract|wasm_runtime)/'; then
              HAS_CONTRACTS=true
            fi

            # Check for ring module
            if echo "$file" | grep -q '^crates/core/src/ring/'; then
              HAS_RING=true
            fi
          done <<< "$CHANGED_FILES"

          # Build rule list
          if [ "$HAS_RUST" = true ]; then
            RULES="$RULES code-style.md"
          fi
          if [ "$HAS_CORE" = true ]; then
            RULES="$RULES testing.md"
          fi
          if [ "$HAS_OPERATIONS" = true ]; then
            RULES="$RULES operations.md"
          fi
          if [ "$HAS_TRANSPORT" = true ]; then
            RULES="$RULES transport.md"
          fi
          if [ "$HAS_CONTRACTS" = true ]; then
            RULES="$RULES contracts.md"
          fi
          if [ "$HAS_RING" = true ]; then
            RULES="$RULES ring.md"
          fi

          echo "Applicable rules: $RULES"
          echo "rule_names=$RULES" >> "$GITHUB_OUTPUT"

          # Concatenate relevant rule files into a single file for the prompt
          {
            for rule in $RULES; do
              RULE_PATH=".claude/rules/$rule"
              if [ -f "$RULE_PATH" ]; then
                echo "=========================================="
                echo "RULE FILE: $rule"
                echo "=========================================="
                cat "$RULE_PATH"
                echo ""
                echo ""
              fi
            done
          } > /tmp/relevant_rules.txt

          echo "--- Relevant rules summary ---"
          echo "Rules: $RULES"
          echo "Has Rust: $HAS_RUST"
          echo "Has Core: $HAS_CORE"
          wc -l /tmp/relevant_rules.txt

      - name: Claude rule review
        id: review
        if: steps.rules.outputs.skip != 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: '--model sonnet --max-turns 25 --effort high'
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }}: "${{ github.event.pull_request.title }}"

            ## Your Task

            Review the diff of this PR against the project's coding rules listed below.
            Only check rules that are relevant to the actual changes — do not report on
            files or patterns that were not modified in this PR.

            Focus on the DIFF only. Do not review unchanged code.

            ## Applicable Rules

            The following rules apply to this PR based on the changed file paths:
            **${{ steps.rules.outputs.rule_names }}**

            Read each applicable rule file from `.claude/rules/` to understand the full requirements.

            ## Review Instructions

            1. Read the relevant rule files from `.claude/rules/`
            2. Run `git diff origin/${{ github.event.pull_request.base.ref }}...HEAD` to see the full diff
            3. Check each changed file against the applicable rules
            4. Report findings grouped by severity

            ## Severity Levels

            **CRITICAL** — Violations that will cause bugs or break deterministic simulation:
            - `std::time::Instant::now()` or `tokio::time::sleep()` in crates/core/ (must use TimeSource)
            - `rand::random()` or `rand::thread_rng()` in crates/core/ (must use GlobalRng)
            - `tokio::net::UdpSocket` in crates/core/ (must use Socket trait)
            - Network send before `op_manager.push()` (push-before-send violation)
            - Deleted or commented-out tests (must use #[ignore] + TODO-MUST-FIX)

            **WARNING** — Issues that should be addressed but aren't showstoppers:
            - `.unwrap()` in new production code (not tests)
            - Fire-and-forget spawns without BackgroundTaskMonitor
            - Retry loops without jitter
            - Missing PR description sections
            - Cleanup exemptions without TTL or age threshold
            - Unguarded `biased;` in tokio::select!

            **INFO** — Style suggestions and minor improvements:
            - Missing doc comments on new public APIs
            - Catch-all `_ =>` in exhaustive matches

            ## Output Format

            Return your findings as markdown. If there are NO findings, say so briefly.

            Use this format:

            ### 🔍 Rule Review: [summary]

            **Rules checked:** [list of rule files checked]
            **Files reviewed:** [count]

            #### Critical
            - [ ] `file:line` — description (rule: X)

            #### Warnings
            - [ ] `file:line` — description (rule: X)

            #### Info
            - [ ] `file:line` — description (rule: X)

            > **To acknowledge findings:** Check each box above once addressed (or a tracking issue opened),
            > or post `/ack` to dismiss all findings for this revision.
            > Merge is blocked until Critical and Warning findings are acknowledged.

            If there are no findings at any severity level, output:

            ### ✅ Rule Review: No issues found

            **Rules checked:** [list]
            **Files reviewed:** [count]

            No rule violations detected — merge is not blocked by this check.

      - name: Post review comment
        if: steps.rules.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- claude-rule-review -->';
            const reviewOutcome = '${{ steps.review.outcome }}';

            // If Claude step failed, post a warning instead of silently doing nothing
            if (reviewOutcome === 'failure') {
              const warningBody = marker + '\n' +
                '### ⚠️ Claude Rule Review: Failed to run\n\n' +
                'The Claude rule review step failed (likely an authentication or API issue). ' +
                'Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\n' +
                '---\n*Automated review against `.claude/rules/`. Critical and Warning findings block merge — check boxes or post `/ack` to acknowledge.*';

              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });

              const existing = comments.find(c => c.body.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body: warningBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: warningBody,
                });
              }
              core.warning('Claude rule review failed — warning comment posted on PR');
              return;
            }

            const execFile = '${{ steps.review.outputs.execution_file }}' || '/home/runner/work/_temp/claude-execution-output.json';

            // Read Claude's output — the file is a JSON array of Turn objects
            let report = '';
            try {
              const raw = fs.readFileSync(execFile, 'utf8');
              const turns = JSON.parse(raw);

              // Find the last assistant turn with text content
              if (Array.isArray(turns)) {
                const assistantTurns = turns.filter(t => t.type === 'assistant' && t.message?.content);
                if (assistantTurns.length > 0) {
                  const last = assistantTurns[assistantTurns.length - 1];
                  const textParts = last.message.content
                    .filter(c => c.type === 'text')
                    .map(c => c.text);
                  report = textParts.join('\n');
                }
              }
            } catch (e) {
              console.log(`Could not parse execution file: ${e.message}`);
              return;
            }

            if (!report || report.trim().length === 0) {
              console.log('No report content found');
              return;
            }

            const body = report + '\n\n---\n*Automated review against `.claude/rules/`. Critical and Warning findings block merge — check boxes or post `/ack` to acknowledge.*';

            // Find and update existing sticky comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body.includes(marker));
            const fullBody = marker + '\n' + body;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
              console.log(`Updated existing comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
              console.log('Created new review comment');
            }

      - name: Set acknowledgment status
        if: steps.rules.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- claude-rule-review -->';

            // Read the already-posted comment body
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const body = existing ? existing.body : '';

            function countUnchecked(text) {
              const lines = text.split('\n');
              let inSection = false, unchecked = 0;
              for (const line of lines) {
                if (/^####\s*(Critical|Warning)/i.test(line)) inSection = true;
                else if (/^####/.test(line)) inSection = false;
                if (inSection && /^- \[ \]/.test(line)) unchecked++;
              }
              return unchecked;
            }

            const unchecked = countUnchecked(body);
            const noFindings = !body.includes('- [ ]') && !body.includes('- [x]');

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ github.event.pull_request.head.sha }}',
              state: unchecked > 0 ? 'failure' : 'success',
              context: 'rule-review/findings',
              description: unchecked > 0
                ? `${unchecked} finding(s) need acknowledgment — check boxes or comment /ack`
                : noFindings ? 'No critical/warning findings' : 'All findings acknowledged',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/pull/${context.issue.number}`,
            });
