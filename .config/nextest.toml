[profile.ci]
# Retry individual failed tests instead of re-running entire workspace.
# Real-network tests are timing-sensitive and occasionally fail under CI
# resource pressure — per-test retries avoid the 10-15 min penalty of
# re-running all tests.
retries = 2
# Don't stop on first failure — run all tests to surface multiple issues.
fail-fast = false
# Terminate tests that hang (2 periods of 120s = 4 min max per test).
slow-timeout = { period = "120s", terminate-after = 2 }

# Interest renewal drives a 2-gateway / 4-node / 8-contract simulation for ~1200s
# of virtual time (paused-time direct runner, advanced in ~1ms quanta), so its wall-clock
# scales with runner CPU and can be 2-3x slower under load. The original CI
# timeout (#3792) was a 1800s convergence-polling tail stacked on top of that
# whenever the network didn't fully converge; that tail is now skipped for this
# test (it never asserts convergence — see test_interest_renewal's
# no_convergence_wait()). This generous timeout remains as headroom for the fixed
# event-phase cost on slow/contended runners.
[[profile.ci.overrides]]
filter = "test(test_interest_renewal)"
slow-timeout = { period = "300s", terminate-after = 2 }

# Ping integration tests have internal timeouts of 360-600s with sequential
# phases (WS connect retries, ring connection waits, contract operations).
# Default 240s nextest cap kills them before they can finish on slow runners.
[[profile.ci.overrides]]
filter = "package(freenet-ping-app)"
slow-timeout = { period = "300s", terminate-after = 3 }

# #4233 wide-star UPDATE fan-out liveness tests (40/60/80 direct subscribers).
# These drive a 1-gateway / N-subscriber star through 300s of virtual time in
# the paused-time Turmoil runner, advanced in tiny quanta. Wall-clock cost
# scales with N (each of the N subscriber event loops is stepped every quantum),
# so the wide-star variants need far more than the default 240s cap. See
# test_fanout_liveness_* / run_fanout_liveness_scenario in
# tests/simulation_integration.rs (issue #4233).
[[profile.ci.overrides]]
filter = "test(test_fanout_liveness)"
slow-timeout = { period = "600s", terminate-after = 2 }
retries = 0

# test_ping_blocked_peers is the canary for the CONNECT promotion-drop bug
# class (#3838, fixed in #3893). The profile-wide retries = 2 masked a ~40%
# per-run failure rate as ~6% effective during the flaky period, making an
# "actively broken" test look "flaky but mostly passing". Run it with no
# nextest retries so any re-emergence of that bug class surfaces on the first
# run instead of being hidden (#3895).
#
# This does NOT reintroduce environmental flakiness: the only legitimately
# transient failure mode (loopback port collisions with parallel tests) is
# already handled inside the test itself by an in-process retry loop with
# jitter (MAX_PORT_RETRY_ATTEMPTS in run_app_blocked_peers.rs), so it never
# needed nextest-level retries to absorb port races.
[[profile.ci.overrides]]
filter = "test(test_ping_blocked_peers)"
retries = 0

[profile.nightly]
# Nightly tests run longer by design; no retries since failures need investigation.
retries = 0
fail-fast = false
# Long-running simulation tests can take 19+ min on shared CI runners
# (test_get_reliability_with_latency: 100 nodes + fault injection).
# Allow 15 min per period with 2 periods = 30 min hard cap.
slow-timeout = { period = "900s", terminate-after = 2 }
