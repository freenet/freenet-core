<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Freenet</title>
    <style>
      :root {
        --bg: #0f1419;
        --fg: #e6e8eb;
        --card: #1a2028;
        --border: #2d3748;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f5f5f5;
          --fg: #1a1a1a;
          --card: #fff;
          --border: #d1d5db;
        }
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--fg);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 40px;
        text-align: center;
        max-width: 400px;
      }
      .icon {
        font-size: 48px;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">&#x2139;</div>
      <h1>Request expired</h1>
      <p>This permission request has already been answered or timed out.</p>
    </div>
  </body>
</html>
