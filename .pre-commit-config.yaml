# Pre-commit hooks for Freenet Core
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# Docs: https://pre-commit.com/

repos:
  # Rust formatting and linting
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        name: cargo fmt
        description: Run cargo fmt on Rust code
        args: ['--all', '--', '--check']
        pass_filenames: false

  # Custom clippy hook that only runs on packages with changed files
  - repo: local
    hooks:
      - id: clippy
        name: cargo clippy
        description: Run cargo clippy only on packages with changed files
        entry: scripts/pre-commit-clippy.sh
        language: script
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
        name: Check for merge conflicts

      - id: check-yaml
        name: Check YAML syntax

      - id: end-of-file-fixer
        name: Fix end of files
        exclude: '\.patch$'

      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: [--markdown-linebreak-ext=md]
